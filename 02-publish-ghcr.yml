# =========================================================
# Projet CICD - EC06 - Etudiant 7
# Workflow 2/3 : Publication de l'image dans GHCR
# =========================================================
# Declenchement : push sur main (apres succes implicite du CI) et manuel.
# Ce workflow construit l'image UNE SEULE FOIS puis la publie dans GHCR avec
# plusieurs tags (sha, latest) afin de pouvoir l'identifier de maniere
# unique par son digest (immuable) pour la promotion ulterieure sans rebuild.

name: 02 - Publish to GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build et publication GHCR
    runs-on: ubuntu-latest
    environment: recette
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag_sha: sha-${{ github.sha }}

    steps:
      - name: Recuperation du code (checkout)
        uses: actions/checkout@v4

      - name: Connexion a GHCR avec GITHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        # Remarque securite : aucun secret personnel n'est utilise ici.
        # GITHUB_TOKEN est genere automatiquement par GitHub pour la duree
        # du run et dispose du droit "packages: write" via permissions
        # ci-dessus. Voir docs/06-analyse-production-reelle.md.

      - name: Preparation des metadonnees / tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=recette

      - name: Build et push de l'image (une seule construction)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Preuve - tag et digest publies
        run: |
          echo "### Publication GHCR - Etudiant 7" >> $GITHUB_STEP_SUMMARY
          echo "- Image : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags publies : sha-${{ github.sha }}, recette, (latest si branche main)" >> $GITHUB_STEP_SUMMARY
          echo "- Digest (identifiant immuable de l'artefact) : ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ce digest doit etre copie et utilise tel quel dans le workflow" >> $GITHUB_STEP_SUMMARY
          echo "03-promote.yml afin de promouvoir EXACTEMENT le meme artefact" >> $GITHUB_STEP_SUMMARY
          echo "vers la production simulee, sans jamais reconstruire l'image." >> $GITHUB_STEP_SUMMARY
